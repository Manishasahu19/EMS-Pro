<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Add An Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Add An Employee</h1><hr>
        <form action="/add_emp" method="post">
            {% csrf_token %}
            <label>First Name</label><input type="text" name="first_name" class="form-control" required><br>
            <label>Last Name</label><input type="text" name="last_name" class="form-control" required><br>
            <label>Salary</label><input type="number" name="salary" class="form-control" required><br>
            <label>Bonus</label><input type="number" name="bonus" class="form-control" required><br>
            <label>Phone Number</label><input type="text" name="phone" class="form-control" required><br>
            
            <label>Department</label>
            <select name="dept" class="form-control">
                {% for dept in depts %}
                <option value="{{dept.id}}">{{dept.name}}</option>
                {% endfor %}
            </select><br>
            
            <label>Role</label>
            <select name="role" class="form-control">
                {% for role in roles %}
                <option value="{{role.id}}">{{role.name}}</option>
                {% endfor %}
            </select><br>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</body>
</html>
