<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Filter Employee Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Filter Employee Details</h1><hr>
        <form action="/filter_emp" method="post">
            {% csrf_token %}
            <label>Employee Name (First/Last)</label><input type="text" name="name" class="form-control"><br>
            <label>Department</label><input type="text" name="dept" class="form-control"><br>
            <label>Role</label><input type="text" name="role" class="form-control"><br>
            <button type="submit" class="btn btn-primary">Filter</button>
        </form>
    </div>
</body>
</html>
