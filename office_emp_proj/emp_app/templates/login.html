<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Pro - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: white; 
        }
        .login-card { 
            background-color: #1f1f1f; 
            border: 1px solid #333; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        /* लेबल्स को साफ़ दिखाने के लिए कस्टम CSS */
        .form-label {
            color: #e0e0e0 !important;
            font-weight: 500;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card login-card p-4" style="width: 24rem;">
        <h3 class="text-center fw-bold text-primary mb-4">EMS Pro Login</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-light">Username</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-light">Password</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
        </form>
    </div>
</body>
</html>
